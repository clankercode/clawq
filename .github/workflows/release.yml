name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OCaml + opam
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.1.1
          cache-prefix: deps-${{ hashFiles('clawq.opam', 'dune-project') }}

      - name: Install system package for sqlite bindings
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Install opam deps
        run: |
          opam option --global 'archive-mirrors+="https://opam.ocaml.org/cache"'
          opam install -y . --deps-only

      - name: Detect opam switch
        id: opam-switch
        run: echo "name=$(opam switch show)" >> "$GITHUB_OUTPUT"

      - name: Build optimized speed variant
        run: make build-opt-speed-stripped SHELL_SWITCH="${{ steps.opam-switch.outputs.name }}"

      - name: Build optimized size variant
        run: make build-opt-size-stripped SHELL_SWITCH="${{ steps.opam-switch.outputs.name }}"

      - name: Prepare npm binary + debug symbols
        run: |
          mkdir -p npm-pkg/bin
          cp _build_opt_speed/default/src/main.exe npm-pkg/bin/clawq
          chmod +w npm-pkg/bin/clawq
          objcopy --only-keep-debug npm-pkg/bin/clawq npm-pkg/bin/clawq.debug
          chmod -x npm-pkg/bin/clawq.debug
          strip npm-pkg/bin/clawq
          objcopy --add-gnu-debuglink=npm-pkg/bin/clawq.debug npm-pkg/bin/clawq

      - name: Set npm package version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd npm-pkg
          npm version "${VERSION}" --no-git-tag-version

      - name: Rename release artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="$(uname -m)"
          mv dist/clawq-speed "dist/clawq-${VERSION}-linux-${ARCH}-speed"
          mv dist/clawq-size "dist/clawq-${VERSION}-linux-${ARCH}-size"

      - name: Upload npm package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-pkg
          path: npm-pkg/

      - name: Ensure GitHub release exists
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME not found, creating draft..."
            gh release create "$GITHUB_REF_NAME" \
              --draft \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="$(uname -m)"
          gh release upload "$GITHUB_REF_NAME" \
            "dist/clawq-${VERSION}-linux-${ARCH}-speed" \
            "dist/clawq-${VERSION}-linux-${ARCH}-size" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    runs-on: ubuntu-latest
    needs: build-and-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download npm package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-pkg
          path: npm-pkg

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish to npm (trusted, OIDC)
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is not configured; skipping npm publish."
            exit 0
          fi
          cd npm-pkg && npm publish --access=public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OCaml + opam
        uses: avsm/setup-ocaml@v3
        with:
          ocaml-compiler: 5.1.1

      - name: Install system package for sqlite bindings
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Restore opam cache
        id: opam-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.opam
          key: opam-${{ runner.os }}-${{ hashFiles('clawq.opam', 'dune-project') }}

      - name: Install opam deps
        if: steps.opam-cache.outputs.cache-hit != 'true'
        run: |
          opam update
          opam install -y . --deps-only --with-test
          opam install -y ocamlformat.0.28.1

      - name: Save opam cache
        if: steps.opam-cache.outputs.cache-hit != 'true' && always()
        uses: actions/cache/save@v4
        with:
          path: ~/.opam
          key: opam-${{ runner.os }}-${{ hashFiles('clawq.opam', 'dune-project') }}

      - name: Cache dune build artifacts
        uses: actions/cache@v4
        with:
          path: _build
          key: dune-build-${{ runner.os }}-${{ hashFiles('clawq.opam', 'dune-project', 'dune-workspace', 'src/dune', 'test/dune') }}-${{ hashFiles('src/**', 'test/**') }}
          restore-keys: |
            dune-build-${{ runner.os }}-${{ hashFiles('clawq.opam', 'dune-project', 'dune-workspace', 'src/dune', 'test/dune') }}-
            dune-build-${{ runner.os }}-

      - name: Build
        run: |
          eval "$(opam env)"
          dune build

      - name: Extraction check
        run: |
          eval "$(opam env)"
          ./scripts/extract.sh
          git diff --exit-code src/extracted/clawq_core.ml src/extracted/clawq_core.mli

      - name: Run tests
        run: |
          eval "$(opam env)"
          dune runtest

      - name: Binary size check
        run: |
          eval "$(opam env)"
          make binary-size-check SHELL_SWITCH="$(opam switch show)"

      - name: Format check
        run: |
          eval "$(opam env)"
          dune fmt 2>&1 || true
          git diff --exit-code

  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install docs deps
        run: npm ci

      - name: Build docs
        run: npm run build

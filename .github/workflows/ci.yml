name: ci

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Version sync check
        run: ./scripts/sync_version.sh --check

      - name: Setup OCaml + opam
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.1.1
          cache-prefix: deps-${{ hashFiles('clawq.opam', 'dune-project') }}

      - name: Install system package for sqlite bindings
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Install opam deps
        run: |
          opam option --global 'archive-mirrors+="https://opam.ocaml.org/cache"'
          opam install -y . --deps-only --with-test
          opam install -y ocamlformat.0.28.1

      - name: Restore dune build cache
        uses: actions/cache/restore@v4
        with:
          path: _build
          key: dune-build-${{ runner.os }}-${{ hashFiles('clawq.opam', 'dune-project', 'dune-workspace', 'src/dune', 'test/dune') }}-${{ hashFiles('src/**', 'test/**') }}
          restore-keys: |
            dune-build-${{ runner.os }}-${{ hashFiles('clawq.opam', 'dune-project', 'dune-workspace', 'src/dune', 'test/dune') }}-
            dune-build-${{ runner.os }}-

      - name: Build
        run: |
          eval "$(opam env)"
          dune build

      - name: Extraction check
        run: |
          eval "$(opam env)"
          ./scripts/extract.sh
          git diff --exit-code src/extracted/clawq_core.ml src/extracted/clawq_core.mli

      - name: Run tests
        run: |
          eval "$(opam env)"
          dune runtest
        env:
          CLAWQ_TEST_DOCKER: "1"

      - name: Save dune build cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: _build
          key: dune-build-${{ runner.os }}-${{ hashFiles('clawq.opam', 'dune-project', 'dune-workspace', 'src/dune', 'test/dune') }}-${{ hashFiles('src/**', 'test/**') }}

  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install docs deps
        run: npm ci

      - name: Build docs
        run: npm run build

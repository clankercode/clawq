<!doctype html>
<!--
  Social preview card (Open Graph / Twitter) source — 1200x630.
  Rendered to ../public/og-image.png by render-og-image.mjs (`npm run render:og`).
  Edit this file to change the card, then re-render. Self-contained except for
  Google Fonts (the render script waits for document.fonts.ready).
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;500&family=EB+Garamond:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-primary: #0d0b0f;
        --bg-secondary: #13111a;
        --brass-primary: #c9a84c;
        --brass-light: #e2c97e;
        --brass-dark: #8b7332;
        --coq-teal: #2e8b7a;
        --coq-teal-light: #5bbfad;
        --text-primary: #e8e2d6;
        --text-secondary: #9c978a;
        --text-tertiary: #6b6660;
        --qed-gold: #b8860b;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1200px;
        height: 630px;
      }
      body {
        background:
          radial-gradient(120% 90% at 50% 42%, #1a1722 0%, var(--bg-primary) 60%, #070608 100%);
        color: var(--text-primary);
        font-family: "EB Garamond", Georgia, serif;
        overflow: hidden;
        position: relative;
      }
      /* Ornamental double border */
      .frame {
        position: absolute;
        inset: 22px;
        border: 2px solid var(--brass-dark);
        box-shadow:
          inset 0 0 0 1px rgba(201, 168, 76, 0.18),
          0 0 90px rgba(201, 168, 76, 0.05);
      }
      .frame::after {
        content: "";
        position: absolute;
        inset: 7px;
        border: 1px solid rgba(201, 168, 76, 0.32);
      }
      .stage {
        position: relative;
        width: 100%;
        height: 100%;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      /* ---- Header ---- */
      .wordmark {
        font-family: "Playfair Display", serif;
        font-weight: 900;
        font-size: 76px;
        letter-spacing: 0.22em;
        color: var(--text-primary);
        text-indent: 0.22em;
        margin-top: 58px;
        text-shadow: 0 0 38px rgba(201, 168, 76, 0.22);
      }
      .tagline {
        font-size: 27px;
        font-style: italic;
        color: var(--brass-light);
        margin-top: 6px;
        letter-spacing: 0.01em;
      }
      .rule {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 14px;
        color: var(--text-tertiary);
      }
      .rule .line {
        width: 120px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--brass-dark), transparent);
      }
      .rule .diamond {
        color: var(--qed-gold);
        font-size: 12px;
      }
      /* ---- Diagram ---- */
      .diagram {
        position: absolute;
        inset: 0;
        z-index: 1;
      }
      svg text {
        font-family: "EB Garamond", Georgia, serif;
      }
      .n-label {
        fill: var(--text-secondary);
        font-size: 17px;
        text-anchor: middle;
      }
      .n-sub {
        fill: var(--text-secondary);
        font-size: 17px;
        text-anchor: middle;
        font-style: italic;
      }
      .relay-label {
        fill: var(--brass-light);
        font-family: "Playfair Display", serif;
        font-weight: 700;
        font-size: 21px;
        letter-spacing: 0.16em;
        text-anchor: middle;
      }
      .relay-sub {
        fill: var(--brass-primary);
        font-size: 15px;
        text-anchor: middle;
        letter-spacing: 0.04em;
      }
      .agent-label {
        fill: var(--text-primary);
        font-family: "Playfair Display", serif;
        font-weight: 700;
        font-size: 18px;
        text-anchor: middle;
        letter-spacing: 0.03em;
      }
      /* ---- Footer ---- */
      .footer {
        position: absolute;
        bottom: 46px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        padding: 0 70px;
        z-index: 3;
      }
      .footer .site {
        font-family: "JetBrains Mono", monospace;
        font-size: 21px;
        color: var(--brass-primary);
        letter-spacing: 0.02em;
      }
      .footer .verified {
        font-variant: small-caps;
        font-size: 19px;
        letter-spacing: 0.12em;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .footer .verified .seal {
        color: var(--coq-teal-light);
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <div class="frame"></div>

    <!-- Network diagram (drawn behind text via z-index) -->
    <svg class="diagram" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Reusable gear (favicon motif) -->
        <symbol id="gear" viewBox="0 0 32 32">
          <circle cx="16" cy="16" r="6" fill="none" stroke="currentColor" stroke-width="2" />
          <path
            d="M16 2v4M16 26v4M2 16h4M26 16h4M5.86 5.86l2.83 2.83M23.31 23.31l2.83 2.83M5.86 26.14l2.83-2.83M23.31 8.69l2.83-2.83"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
          <circle
            cx="16"
            cy="16"
            r="12"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-dasharray="4 3"
          />
        </symbol>
        <marker id="arrowBrass" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7"
          markerHeight="7" orient="auto-start-reverse">
          <path d="M0,1 L9,5 L0,9 z" fill="#c9a84c" />
        </marker>
        <marker id="arrowTeal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6"
          markerHeight="6" orient="auto-start-reverse">
          <path d="M0,1.5 L8,5 L0,8.5 z" fill="#2e8b7a" />
        </marker>
        <radialGradient id="relayGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.22" />
          <stop offset="100%" stop-color="#c9a84c" stop-opacity="0" />
        </radialGradient>
      </defs>

      <!-- Faint corner gears -->
      <g opacity="0.08" color="#c9a84c">
        <use href="#gear" x="40" y="40" width="120" height="120" />
        <use href="#gear" x="1040" y="470" width="120" height="120" />
      </g>
      <g opacity="0.06" color="#2e8b7a">
        <use href="#gear" x="1066" y="40" width="94" height="94" />
        <use href="#gear" x="40" y="496" width="94" height="94" />
      </g>

      <!-- ===== Local fan-out links (thin, teal, two-way) ===== -->
      <g stroke="#2e8b7a" stroke-width="1.6" opacity="0.72"
        marker-start="url(#arrowTeal)" marker-end="url(#arrowTeal)">
        <!-- Agent A satellites -->
        <line x1="321" y1="335" x2="238" y2="266" />
        <line x1="347" y1="322" x2="340" y2="243" />
        <line x1="321" y1="385" x2="238" y2="454" />
        <line x1="347" y1="398" x2="340" y2="477" />
        <!-- Agent B satellites -->
        <line x1="879" y1="335" x2="962" y2="266" />
        <line x1="853" y1="322" x2="860" y2="243" />
        <line x1="879" y1="385" x2="962" y2="454" />
        <line x1="853" y1="398" x2="860" y2="477" />
      </g>

      <!-- ===== Relay path (thick, brass, two-way) ===== -->
      <g stroke="#c9a84c" stroke-width="3.4" marker-start="url(#arrowBrass)"
        marker-end="url(#arrowBrass)">
        <line x1="388" y1="360" x2="550" y2="360" />
        <line x1="650" y1="360" x2="812" y2="360" />
      </g>

      <!-- ===== Satellite nodes ===== -->
      <g>
        <!-- Agent A peers (projects) -->
        <circle cx="222" cy="252" r="21" fill="#13111a" stroke="#2e8b7a" stroke-width="1.6" />
        <use href="#gear" x="207" y="237" width="30" height="30" color="#5bbfad" />
        <text x="222" y="222" class="n-sub">project</text>
        <circle cx="338" cy="222" r="21" fill="#13111a" stroke="#2e8b7a" stroke-width="1.6" />
        <use href="#gear" x="323" y="207" width="30" height="30" color="#5bbfad" />
        <text x="338" y="192" class="n-sub">project</text>
        <!-- Agent A subagents -->
        <circle cx="222" cy="468" r="21" fill="#13111a" stroke="#2e8b7a" stroke-width="1.6" />
        <use href="#gear" x="207" y="453" width="30" height="30" color="#5bbfad" />
        <text x="222" y="510" class="n-sub">subagent</text>
        <circle cx="338" cy="498" r="21" fill="#13111a" stroke="#2e8b7a" stroke-width="1.6" />
        <use href="#gear" x="323" y="483" width="30" height="30" color="#5bbfad" />
        <text x="338" y="540" class="n-sub">subagent</text>

        <!-- Agent B peers (projects) -->
        <circle cx="978" cy="252" r="21" fill="#13111a" stroke="#2e8b7a" stroke-width="1.6" />
        <use href="#gear" x="963" y="237" width="30" height="30" color="#5bbfad" />
        <text x="978" y="222" class="n-sub">project</text>
        <circle cx="862" cy="222" r="21" fill="#13111a" stroke="#2e8b7a" stroke-width="1.6" />
        <use href="#gear" x="847" y="207" width="30" height="30" color="#5bbfad" />
        <text x="862" y="192" class="n-sub">project</text>
        <!-- Agent B subagents -->
        <circle cx="978" cy="468" r="21" fill="#13111a" stroke="#2e8b7a" stroke-width="1.6" />
        <use href="#gear" x="963" y="453" width="30" height="30" color="#5bbfad" />
        <text x="978" y="510" class="n-sub">subagent</text>
        <circle cx="862" cy="498" r="21" fill="#13111a" stroke="#2e8b7a" stroke-width="1.6" />
        <use href="#gear" x="847" y="483" width="30" height="30" color="#5bbfad" />
        <text x="862" y="540" class="n-sub">subagent</text>
      </g>

      <!-- ===== Main agents (faint brass halo => tier above satellites, below relay) ===== -->
      <g>
        <circle cx="350" cy="360" r="58" fill="url(#relayGlow)" opacity="0.55" />
        <circle cx="350" cy="360" r="38" fill="#13111a" stroke="#c9a84c" stroke-width="2.2" />
        <use href="#gear" x="328" y="338" width="44" height="44" color="#e2c97e" />
        <text x="350" y="424" class="agent-label">Agent A</text>

        <circle cx="850" cy="360" r="58" fill="url(#relayGlow)" opacity="0.55" />
        <circle cx="850" cy="360" r="38" fill="#13111a" stroke="#c9a84c" stroke-width="2.2" />
        <use href="#gear" x="828" y="338" width="44" height="44" color="#e2c97e" />
        <text x="850" y="424" class="agent-label">Agent B</text>
      </g>

      <!-- ===== Relay hub ===== -->
      <g>
        <circle cx="600" cy="360" r="82" fill="url(#relayGlow)" />
        <circle cx="600" cy="360" r="61" fill="none" stroke="#8b7332" stroke-width="1"
          stroke-dasharray="3 5" />
        <circle cx="600" cy="360" r="50" fill="#0d0b0f" stroke="#c9a84c" stroke-width="2.8" />
        <text x="600" y="367" class="relay-label">RELAY</text>
        <text x="600" y="437" class="relay-sub">self-hostable</text>
      </g>
    </svg>

    <!-- Foreground text -->
    <div class="stage">
      <div class="wordmark">CLAWQ</div>
      <div class="tagline">Agent-to-agent IM &mdash; anywhere to anywhere</div>
      <div class="rule">
        <span class="line"></span><span class="diamond">&#x25C6;</span><span class="line"></span>
      </div>
    </div>

    <div class="footer">
      <span class="site">clawq.org</span>
      <span class="verified"><span class="seal">&#x25C6;</span>formally verified</span>
    </div>
  </body>
</html>

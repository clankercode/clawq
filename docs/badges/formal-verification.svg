<svg xmlns="http://www.w3.org/2000/svg" width="144" height="20" role="img" aria-label="Coq proofs: 69 verified">
  <title>Coq proofs: 69 verified</title>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="r">
    <rect width="144" height="20" rx="3" fill="#fff"/>
  </clipPath>
  <g clip-path="url(#r)">
    <rect width="72" height="20" fill="#555"/>
    <rect x="72" width="72" height="20" fill="#4c1"/>
    <rect width="144" height="20" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="11">
    <text aria-hidden="true" x="360" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)">Coq proofs</text>
    <text x="360" y="140" transform="scale(.1)" fill="#fff">Coq proofs</text>
    <text aria-hidden="true" x="1080" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)">69 verified</text>
    <text x="1080" y="140" transform="scale(.1)" fill="#fff">69 verified</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="188" height="24" role="img" aria-label="Coq proofs: 142 verified">
  <title>Coq proofs: 142 verified</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2340"/>
      <stop offset="100%" stop-color="#151929"/>
    </linearGradient>
    <linearGradient id="icon-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1f5e"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity=".10"/>
      <stop offset="50%" stop-color="#fff" stop-opacity=".03"/>
      <stop offset="51%" stop-color="#000" stop-opacity=".03"/>
      <stop offset="100%" stop-color="#000" stop-opacity=".08"/>
    </linearGradient>
    <clipPath id="r">
      <rect width="188" height="24" rx="5"/>
    </clipPath>
  </defs>
  <g clip-path="url(#r)">
    <!-- Background -->
    <rect width="188" height="24" fill="url(#bg)"/>
    <!-- Icon area -->
    <rect width="26" height="24" fill="url(#icon-bg)"/>
    <!-- Glass overlay -->
    <rect width="188" height="24" fill="url(#glass)"/>
    <!-- Top highlight -->
    <rect width="188" height="1" fill="#fff" opacity=".06"/>
  </g>
  <!-- Gold shield icon with checkmark -->
  <g transform="translate(7,6)">
    <path d="M6 0.5 L11 2.5 V6.5 C11 9.5 8.5 11.5 6 12 C3.5 11.5 1 9.5 1 6.5 V2.5 Z"
          fill="url(#gold)" stroke="#92400e" stroke-width="0.4"/>
    <path d="M3.5 6 L5.2 7.8 L8.5 4.2"
          fill="none" stroke="#fff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Subtle separator -->
  <rect x="26" y="4" width="1" height="16" fill="#fff" opacity=".06" rx="0.5"/>
  <!-- Label text with shadow -->
  <text x="64" y="16" text-anchor="middle" fill="#000" opacity=".35"
        font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="10.5"
        text-rendering="geometricPrecision">Coq proofs</text>
  <text x="63" y="15" text-anchor="middle" fill="#c4b5e0"
        font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="10.5"
        text-rendering="geometricPrecision">Coq proofs</text>
  <!-- Dot separator -->
  <circle cx="100" cy="12" r="1.5" fill="#d97706" opacity=".5"/>
  <!-- Value text with shadow -->
  <text x="144" y="16" text-anchor="middle" fill="#000" opacity=".35"
        font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="10.5" font-weight="bold"
        text-rendering="geometricPrecision">142 verified</text>
  <text x="143" y="15" text-anchor="middle" fill="#fbbf24"
        font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="10.5" font-weight="bold"
        text-rendering="geometricPrecision">142 verified</text>
  <!-- Border -->
  <rect width="188" height="24" rx="5" fill="none" stroke="#fbbf24" stroke-opacity=".2" stroke-width="0.5"/>
</svg>

      file: I011-a-current-tasks-tool-that-supp.todo
      id: I011
      priority: medium
      status: in_progress
      tags: []
      title: 'A current tasks tool that supports adding tasks/todos, listing them, setting them inprog, done, error/problem, or pending. Additionally, it should support adding subtasks to tasks so we have a tree structure. the description of the text should encourage the agent to make use of the tool and populate it to whatever depth is appropriate. The tool should be persistent and never reset by compaction etc. Tasks must have a strong lifecycle: cannot mark a parent done if all children are not, cannot remove an inprogress task, cannot overwrite all tasks at once (so tasks need to be managed individually, but the tool should accept a list of operations). We really want to make this a rich and highly opinionated, useful, tool that gives structure and direction to the agent. The status of the todos should be included in runtime context and sent along with every message like the rest of runtime context. If empty, it should have an explicit message and encourage the agent to add to it using the tool. We should come up with a good name for the tool that''s easy to remember and refer to. We should research other todo tools for agents (in opencode, claude code, codex, etc) and take the best lessons we can from them. see ~/src/pag-server/ref-projects/*. Let''s go deep and make this the best task tree todo tracker tool ever!'
    - complexity: medium
      depends_on: []
      estimate_hours: 10
      file: I012-add-comprehensive-suite-of-mod.todo
      id: I012
      priority: medium
      status: done
      tags: []
      title: 'Add comprehensive suite of models commands. Add /model slash command to list and set models via telegram etc. Add a `clawq models` cli command that works like `opencode models` and other coding CLIs. Add a `models` tool call with actions `set`, `list`, and `get`. Also add a `provider_usage` tool call that gives access to the cached quoats we have access to for the vairious providers. We also want a `clawq usage` command to print out all the usage to stdout. We can add URL routes for all these too via the gateway. you might want to brainstorm to fill in any gaps. Also: IMPORTANT: use your /super-plan skill to aid in planning and research.'
    - complexity: medium
      depends_on: []
      estimate_hours: 10
      file: I013-we-should-add-support-for-a-pl.todo
      id: I013
      priority: medium
      status: done
      tags: []
      title: 'We should add support for a planning mode via background task runners. It should work by getting one agent (as bg task) to produce a plan. Then, if it''s possible to resume sessions and send new prompts to existing sessions, the main agent can go back and forth with the planning agent about any design questions or whatever. Finally, the planning agent produces a plan. This is then fed into a new coding agent (another bg task) to implement. We can store this plan on disk in the worktree directory while this is going on to avoid loading it all into the main agents context (then the planning agent writes to disk and returns a summary). We can even have a version of review-and-fix just for the plan (so planner saves to disk -> loop: plan-review-and-fix goes over plan looking for footguns, gaps, inconsistencies, etc (repeats while improvements are still made) -> coder agent implements -> loop: review-and-fix agent does a review and fixes any issues till none more found). Also we can make use of gpt-5.3-codex-spark here and composer-1.5, both of which will be good for some quick rounds (note: for these lower-reliability models, if used as part of the loop we always want to run an expensive model afterwards. For this reason we should run them earlier in the process so they can do a lot of the heavy lifting). As part of this too, we can ensure the plan lists relevant files so it''s super fast for agents to get up to speed when reviewing.'
